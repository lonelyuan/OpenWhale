<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenWhale - 渗透测试智能体</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Consolas", "Monaco", "Courier New", monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 1.4rem;
      font-weight: bold;
      color: #58a6ff;
    }

    header .subtitle {
      font-size: 0.85rem;
      color: #8b949e;
    }

    #status-indicator {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 1.5s infinite;
    }

    .dot.idle { background: #8b949e; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #log-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 24px;
    }

    .log-entry {
      display: flex;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      animation: fadeIn 0.2s ease;
      word-break: break-word;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-entry .badge {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      height: fit-content;
      margin-top: 2px;
    }

    .log-entry .text {
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* 角色颜色 */
    .role-user       { background: #0d2136; }
    .role-assistant  { background: #0d1f0d; }
    .role-tool_call  { background: #1a1a0d; }
    .role-tool_result { background: #1a0d1a; }
    .role-system     { background: #1a1220; }

    .badge-user       { background: #1f6feb; color: #fff; }
    .badge-assistant  { background: #3fb950; color: #000; }
    .badge-tool_call  { background: #d29922; color: #000; }
    .badge-tool_result { background: #8957e5; color: #fff; }
    .badge-system     { background: #6e7681; color: #fff; }

    footer {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 8px 24px;
      font-size: 0.75rem;
      color: #8b949e;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🐋 OpenWhale</span>
  <span class="subtitle">渗透测试智能体实时监控</span>
  <div id="status-indicator">
    <div class="dot idle" id="status-dot"></div>
    <span id="status-text">等待连接…</span>
  </div>
</header>

<div id="log-container"></div>

<footer>
  <span>OpenWhale v0.1.0</span>
  <span id="msg-count">0 条消息</span>
</footer>

<script>
  const container = document.getElementById('log-container');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const msgCountEl = document.getElementById('msg-count');
  let msgCount = 0;

  const ROLE_LABELS = {
    user: '用户',
    assistant: '智能体',
    tool_call: '工具调用',
    tool_result: '工具结果',
    system: '系统',
  };

  function addEntry(role, content) {
    const entry = document.createElement('div');
    entry.className = `log-entry role-${role}`;

    const label = ROLE_LABELS[role] || role;
    entry.innerHTML = `
      <span class="badge badge-${role}">${label}</span>
      <span class="text">${escapeHtml(content)}</span>
    `;

    container.appendChild(entry);
    container.scrollTop = container.scrollHeight;
    msgCount++;
    msgCountEl.textContent = `${msgCount} 条消息`;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      statusDot.classList.remove('idle');
      statusText.textContent = '已连接';
    };

    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        addEntry(msg.role, msg.content);
      } catch (err) {
        console.warn('解析消息失败', err);
      }
    };

    es.onerror = () => {
      statusDot.classList.add('idle');
      statusText.textContent = '连接断开，5s 后重连…';
      es.close();
      setTimeout(connect, 5000);
    };
  }

  connect();
</script>
</body>
</html>
